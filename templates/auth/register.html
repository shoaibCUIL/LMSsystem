{% extends "layout/base.html" %}

{% block title %}Register - {{ app_name }}{% endblock %}

{% block content %}
<div style="min-height: 85vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%); padding: 3rem 0;">
    <div class="container" style="max-width: 600px;">
        <div class="card">
            <div class="card-body" style="padding: 3rem;">
                <!-- Title -->
                <div style="text-align: center; margin-bottom: 2.5rem;">
                    <h2 style="font-size: 2rem; font-weight: 900; color: #1a202c; margin-bottom: 0.5rem;">Create Account</h2>
                    <p style="color: #718096;">Join thousands of learners today</p>
                </div>

                <!-- Register Form -->
                <form method="POST" action="{{ url_for('register') }}">
                    <!-- Name Fields -->
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                        <div>
                            <label class="form-label">First Name</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="first_name" 
                                name="first_name"
                                placeholder="John"
                            >
                        </div>

                        <div>
                            <label class="form-label">Last Name</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="last_name" 
                                name="last_name"
                                placeholder="Doe"
                            >
                        </div>
                    </div>

                    <!-- Username -->
                    <div class="form-group">
                        <label class="form-label">Username *</label>
                        <input 
                            type="text" 
                            class="form-control" 
                            id="username" 
                            name="username" 
                            placeholder="Choose a username"
                            required 
                            autofocus
                        >
                        <small style="color: #718096; font-size: 0.875rem;">At least 3 characters</small>
                    </div>

                    <!-- Email -->
                    <div class="form-group">
                        <label class="form-label">Email Address *</label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com"
                            required
                        >
                    </div>

                    <!-- Password -->
                    <div class="form-group">
                        <label class="form-label">Password *</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            name="password" 
                            placeholder="Create a strong password"
                            required
                        >
                        <small style="color: #718096; font-size: 0.875rem;">At least 6 characters</small>
                    </div>

                    <!-- Confirm Password -->
                    <div class="form-group">
                        <label class="form-label">Confirm Password *</label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirm_password" 
                            name="confirm_password" 
                            placeholder="Re-enter your password"
                            required
                        >
                    </div>

                    <!-- Terms Checkbox -->
                    <div style="display: flex; align-items: start; margin-bottom: 2rem; gap: 0.75rem;">
                        <input 
                            type="checkbox" 
                            id="terms" 
                            required
                            style="width: 18px; height: 18px; margin-top: 0.2rem; cursor: pointer; flex-shrink: 0;"
                        >
                        <label for="terms" style="margin: 0; color: #4a5568; cursor: pointer; line-height: 1.5;">
                            I agree to the <a href="#" style="color: #667eea; font-weight: 600;">Terms of Service</a> and <a href="#" style="color: #667eea; font-weight: 600;">Privacy Policy</a>
                        </label>
                    </div>
                    
                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.125rem;">
                        <i class="fas fa-user-plus"></i> Create My Account
                    </button>
                </form>

                <!-- Login Link -->
                <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
                    <p style="color: #4a5568; margin-bottom: 1rem;">Already have an account?</p>
                    <a href="{{ url_for('login') }}" class="btn btn-outline" style="width: 100%; padding: 1rem;">
                        <i class="fas fa-sign-in-alt"></i> Login Here
                    </a>
                </div>
            </div>
        </div>

        <!-- Benefits -->
        <div style="text-align: center; margin-top: 1.5rem;">
            <p style="color: #718096;">
                <i class="fas fa-check-circle" style="color: #48bb78;"></i> Free forever • No credit card required
            </p>
        </div>
    </div>
</div>
{% endblock %}
