{% extends "layout/base.html" %}

{% block title %}Login - {{ app_name }}{% endblock %}

{% block content %}
<div style="min-height: 85vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%); padding: 3rem 0;">
    <div class="container" style="max-width: 480px;">
        <div class="card">
            <div class="card-body" style="padding: 3rem;">
                <!-- Title -->
                <div style="text-align: center; margin-bottom: 2.5rem;">
                    <h2 style="font-size: 2rem; font-weight: 900; color: #1a202c; margin-bottom: 0.5rem;">Welcome Back</h2>
                    <p style="color: #718096;">Login to continue your learning journey</p>
                </div>

                <!-- Login Form -->
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label class="form-label">Username</label>
                        <input 
                            type="text" 
                            id="username"
                            name="username" 
                            class="form-control" 
                            placeholder="Enter your username"
                            required
                            autofocus
                        >
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input 
                            type="password" 
                            id="password"
                            name="password" 
                            class="form-control" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div style="display: flex; align-items: center; margin-bottom: 2rem;">
                        <input 
                            type="checkbox" 
                            id="remember" 
                            name="remember"
                            style="width: 18px; height: 18px; margin-right: 0.75rem; cursor: pointer;"
                        >
                        <label for="remember" style="margin: 0; color: #4a5568; cursor: pointer;">
                            Remember me
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.125rem;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <!-- Register Link -->
                <div style="text-align: center; margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0;">
                    <p style="color: #4a5568; margin-bottom: 1rem;">Don't have an account?</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline" style="width: 100%; padding: 1rem;">
                        <i class="fas fa-user-plus"></i> Create New Account
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
