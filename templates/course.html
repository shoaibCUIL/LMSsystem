{% extends "base.html" %}
{% block content %}

<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

<hr>

<h4>Lectures</h4>

<ul class="list-group">
    {% for lecture in lectures %}
    <li class="list-group-item">
        <h6>{{ lecture.title }}</h6>

        <iframe width="100%" height="300"
            src="{{ lecture.video_url }}"
            frameborder="0"
            allowfullscreen>
        </iframe>

    </li>
    {% endfor %}
</ul>

{% endblock %}
